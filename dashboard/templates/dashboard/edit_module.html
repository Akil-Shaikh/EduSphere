{% extends "base.html" %}

{% block content %}
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{% url 'manage_course' pk=module.course.pk %}">Manage: {{ module.course.title }}</a></li>
            <li class="breadcrumb-item active" aria-current="page">Edit: {{ module.title }}</li>
        </ol>
    </nav>

    <h1 class="mb-4">Edit Module</h1>

    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form }}
                <button type="submit" class="btn btn-primary mt-3">Save Changes</button>
                <a href="{% url 'manage_course' pk=module.course.pk %}" class="btn btn-secondary mt-3">Cancel</a>
            </form>
        </div>
    </div>
{% endblock %}
