{% extends "base.html" %}

{% block content %}
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{% url 'course_detail' pk=content.module.course.pk %}">{{ content.module.course.title }}</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ content.title }}</li>
        </ol>
    </nav>

    <div class="card">
        <div class="card-header">
            <h1>{{ content.title }}</h1>
        </div>
        <div class="card-body">
            <p>{{ content.text_content|linebreaks }}</p>
        </div>
    </div>
{% endblock %}
